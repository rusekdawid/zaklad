<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zakład</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Sora:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #FAFAF8;
            --text: #1a1a1a;
            --muted: #999;
            --accent: #E8E4DF;
            --dot: #ccc;
        }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* subtle dot grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, var(--dot) 0.8px, transparent 0.8px);
            background-size: 32px 32px;
            opacity: 0.4;
            pointer-events: none;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
            padding: 2rem;
        }

        .label {
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 3rem;
        }

        .countdown {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
        }

        .unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 100px;
        }

        .number {
            font-family: 'DM Mono', monospace;
            font-weight: 300;
            font-size: clamp(3rem, 10vw, 6.5rem);
            line-height: 1;
            letter-spacing: -0.02em;
            transition: opacity 0.3s ease;
            position: relative;
        }

        .unit-label {
            font-size: 0.65rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--muted);
            margin-top: 0.75rem;
        }

        .separator {
            font-family: 'DM Mono', monospace;
            font-weight: 300;
            font-size: clamp(2.5rem, 8vw, 5rem);
            color: var(--dot);
            align-self: flex-start;
            margin-top: 0.15em;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .target-date {
            margin-top: 3.5rem;
            font-size: 0.85rem;
            font-weight: 200;
            color: var(--muted);
            letter-spacing: 0.1em;
        }

        .target-date span {
            font-weight: 400;
            color: var(--text);
        }

        .progress-bar {
            margin-top: 2.5rem;
            width: min(400px, 80vw);
            height: 2px;
            background: var(--accent);
            border-radius: 1px;
            overflow: hidden;
            margin-left: auto;
            margin-right: auto;
        }

        .progress-fill {
            height: 100%;
            background: var(--text);
            border-radius: 1px;
            transition: width 1s linear;
        }

        .done-message {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .done-message h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 200;
            letter-spacing: -0.02em;
        }

        .done-message p {
            font-size: 0.85rem;
            color: var(--muted);
            font-weight: 300;
        }

        /* entry animation */
        .container {
            animation: fadeUp 1s ease-out;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 500px) {
            .countdown { gap: 0.5rem; }
            .unit { min-width: 70px; }
            .separator { margin: 0 -0.2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="countdown-view">
            <p class="label">Odliczanie do</p>
            <div class="countdown">
                <div class="unit">
                    <div class="number" id="days">--</div>
                    <div class="unit-label">Dni</div>
                </div>
                <div class="separator">:</div>
                <div class="unit">
                    <div class="number" id="hours">--</div>
                    <div class="unit-label">Godzin</div>
                </div>
                <div class="separator">:</div>
                <div class="unit">
                    <div class="number" id="minutes">--</div>
                    <div class="unit-label">Minut</div>
                </div>
                <div class="separator">:</div>
                <div class="unit">
                    <div class="number" id="seconds">--</div>
                    <div class="unit-label">Sekund</div>
                </div>
            </div>
            <div class="target-date">
                <span>11 czerwca 2026</span> — 00:00
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>
        </div>

        <div class="done-message" id="done-view">
            <h1>Czas nadszedł ✦</h1>
            <p>11 czerwca 2026, 00:00</p>
        </div>
    </div>

    <script>
        const TARGET = new Date('2026-06-11T00:00:00').getTime();
        // start date for progress bar (when page was roughly created)
        const START = new Date('2026-05-27T00:00:00').getTime();

        const $days = document.getElementById('days');
        const $hours = document.getElementById('hours');
        const $minutes = document.getElementById('minutes');
        const $seconds = document.getElementById('seconds');
        const $progress = document.getElementById('progress');
        const $countdownView = document.getElementById('countdown-view');
        const $doneView = document.getElementById('done-view');

        function pad(n) {
            return String(n).padStart(2, '0');
        }

        function update() {
            const now = Date.now();
            const diff = TARGET - now;

            if (diff <= 0) {
                $countdownView.style.display = 'none';
                $doneView.style.display = 'flex';
                return;
            }

            const totalSeconds = Math.floor(diff / 1000);
            const d = Math.floor(totalSeconds / 86400);
            const h = Math.floor((totalSeconds % 86400) / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;

            $days.textContent = pad(d);
            $hours.textContent = pad(h);
            $minutes.textContent = pad(m);
            $seconds.textContent = pad(s);

            // progress
            const total = TARGET - START;
            const elapsed = now - START;
            const pct = Math.min(Math.max((elapsed / total) * 100, 0), 100);
            $progress.style.width = pct + '%';
        }

        update();
        setInterval(update, 1000);
    </script>
</body>
</html>
